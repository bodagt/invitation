<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Amiri', serif; background: #1a1a1a; color: #d4af37; text-align: center; }
        
        /* الظرف (Envelope) */
        #envelope {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 999; transition: opacity 1.5s ease; cursor: pointer;
        }

        /* الدعوة */
        .card { max-width: 500px; margin: auto; padding: 40px; background: rgba(255,255,255,0.05); border: 1px solid #d4af37; border-radius: 20px; }
        
        /* التايمر */
        .timer { font-size: 2rem; margin: 20px 0; color: #fff; }
        
        .map-btn { display: inline-block; padding: 12px 30px; background: #d4af37; color: #000; text-decoration: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="envelope" onclick="openInvitation()">
        <h2 style="font-size: 2.5rem;">بكل فخر ندعوكم</h2>
        <p style="font-size: 1.5rem;">اضغط هنا لفتح الدعوة</p>
    </div>

    <div id="invitation" style="display: none; padding-top: 50px;">
        <div class="card">
            <h1 style="font-size: 3rem;">محمود & لقاء</h1>
            <p>يتشرف العروسان بدعوتكم لمشاركتهم فرحة العمر</p>
            <div class="timer" id="timer">...</div>
            <p style="font-size: 1.3rem;">📅 20 يونيو 2026</p>
            <p style="font-size: 1.3rem;">📍 قاعة الماسة - قلين</p>
            <br>
            <a href="https://maps.app.goo.gl/..." class="map-btn">تحديد الموقع على الخريطة</a>
        </div>
    </div>

    <audio id="audio" src="music.mp3"></audio>

    <script>
        function openInvitation() {
            document.getElementById('envelope').style.opacity = '0';
            setTimeout(() => { document.getElementById('envelope').style.display = 'none'; }, 1500);
            document.getElementById('invitation').style.display = 'block';
            document.getElementById('audio').play();
        }

        // التايمر (فاضل 4 أيام)
        const weddingDate = new Date("June 20, 2026 20:00:00").getTime();
        setInterval(() => {
            const diff = weddingDate - new Date().getTime();
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("timer").innerHTML = `${days} يوم و ${hours} ساعة`;
        }, 1000);
    </script>
</body>
</html>
