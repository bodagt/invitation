<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #fdfaf7; font-family: 'Amiri', serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* الظرف */
        #envelope-wrapper { position: absolute; z-index: 20; transition: all 1.2s ease; cursor: pointer; text-align: center; }
        
        /* كارت الدعوة */
        #invitation-card {
            width: 380px; padding: 40px; background: #fff; border: 1px solid #d4c1c1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); opacity: 0; transition: opacity 1.5s;
            text-align: center; border-radius: 5px;
        }

        .quran-verse { font-size: 0.95rem; color: #7a6a70; font-style: italic; margin-bottom: 25px; line-height: 1.8; }
        .timer { font-size: 1.4rem; color: #5c4b51; margin: 15px 0; font-weight: bold; }
        .map-btn { display: inline-block; padding: 10px 25px; background: #c5a059; color: white; text-decoration: none; border-radius: 3px; font-size: 1rem; }
        
        .flower { position: absolute; animation: fall linear infinite; pointer-events: none; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>
