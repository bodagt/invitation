<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        body { margin: 0; background: #fdfaf7; font-family: 'Amiri', serif; overflow: hidden; }
        
        /* شاشة الظرف */
        #envelope-container {
            position: fixed; inset: 0; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            background: #d4af37; transition: 1s ease-in-out;
            cursor: pointer;
        }

        /* ورقة الدعوة اللي بتطلع */
        #invitation-card {
            position: absolute; width: 350px; height: 500px;
            background: white; border: 2px solid #e0d0d0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; transform: translateY(100px); transition: 1s;
        }

        /* تأثير الورد المتساقط */
        .flower { position: absolute; top: -50px; animation: fall linear infinite; font-size: 20px; }
        @keyframes fall { to { transform: translateY(100vh); } }
    </style>
</head>
<body>

    <!-- الظرف -->
    <div id="envelope-container" onclick="openWedding()">
        <h1 style="color: white; font-size: 3rem;">✉️</h1>
    </div>

    <!-- الدعوة -->
    <div id="invitation-card">
        <h1>محمود & لقاء</h1>
        <p>20 يونيو 2026 - قاعة الماسة</p>
    </div>

    <script>
        function openWedding() {
            // اخفاء الظرف
            document.getElementById('envelope-container').style.transform = 'scale(0)';
            
            // ظهور الدعوة
            const card = document.getElementById('invitation-card');
            card.style.opacity = '1';
            card.style.transform = 'translateY(0)';

            // بدء تساقط الورد
            setInterval(() => {
                const f = document.createElement('div');
                f.innerHTML = '🌸';
                f.className = 'flower';
                f.style.left = Math.random() * 100 + 'vw';
                f.style.animationDuration = Math.random() * 3 + 2 + 's';
                document.body.appendChild(f);
                setTimeout(() => f.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
