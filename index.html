<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        /* شاشة البداية (الظرف) */
        #opening-screen {
            position: fixed; inset: 0; background: #fdfaf7;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1s ease-out; cursor: pointer;
        }

        /* تأثير الكتابة على الظرف */
        .envelope-text { font-family: 'Amiri', serif; font-size: 2rem; color: #8e7a82; border-bottom: 2px solid #d4c1c1; padding-bottom: 10px; }

        /* الأنيميشن لما يختفي */
        .fade-out { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <!-- شاشة الظرف -->
    <div id="opening-screen" onclick="startExperience()">
        <div class="envelope-text">اضغط هنا لفتح دعوة زفاف محمود ولقاء</div>
    </div>

    <!-- هنا مكان كود الدعوة (الذي صممناه سابقاً) -->

    <script>
        function startExperience() {
            const screen = document.getElementById('opening-screen');
            screen.classList.add('fade-out');
            
            // تشغيل الموسيقى والأنشودة
            const audio = new Audio('your-nasheed.mp3');
            audio.play();
        }
    </script>
</body>
</html>
