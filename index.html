<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة زفاف محمود و لقاء</title>
<style>
body{font-family:Arial,sans-serif;background:#f8f2e8;text-align:center;margin:0}
#splash{position:fixed;inset:0;background:#111;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff}
.gold-ring{width:260px;height:260px;padding:8px;border-radius:50%;background:linear-gradient(45deg,#b8860b,#ffd700,#fff4b2,#d4af37);overflow:hidden}
.gold-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.enter-btn{margin-top:20px;padding:15px 30px;border-radius:30px;border:none}
.card{max-width:900px;margin:40px auto;padding:20px}
</style>
</head>
<body>
<div id="splash">
<div class="gold-ring">
<img src="https://i.pinimg.com/1200x/85/e4/fd/85e4fd20816b8b867b019d212f0d0818.jpg" alt="العروسين">
</div>
<h1>محمود ❤️ لقاء</h1>
<button class="enter-btn" onclick="document.getElementById('splash').style.display='none'">دخول الدعوة</button>
</div>
<div class="card">
<h2>محمود & لقاء</h2>
<p>السبت 20 يونيو 2026</p>
<p>قاعة الماسة - قلين</p>
<a href="https://maps.app.goo.gl/pWg3LekhAhGSJvTt9">عرض موقع القاعة</a>
</div>
</body>
</html>
