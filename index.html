<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محمود ♥ لقاء</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
background: radial-gradient(circle,#1a1a1a,#000);
color:white;
text-align:center;
overflow-x:hidden;
}

/* خلفية ذهبية متحركة */
.gold-bg{
position:fixed;
width:100%;
height:100%;
background: url('https://i.imgur.com/3ZQ3Z9M.png');
opacity:0.08;
animation: move 20s linear infinite;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

.container{
position:relative;
padding:60px 20px;
}

.title{
font-size:60px;
color:#d4af37;
margin-bottom:10px;
animation: fadeIn 2s ease;
}

.sub{
font-size:20px;
color:#ccc;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid #d4af37;
max-width:600px;
margin:20px auto;
padding:20px;
border-radius:20px;
backdrop-filter: blur(10px);
}

.countdown{
font-size:28px;
color:#d4af37;
margin-top:10px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#d4af37;
color:black;
text-decoration:none;
border-radius:30px;
font-weight:bold;
}

.btn:hover{
background:white;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="gold-bg"></div>

<div class="container">

<h1 class="title">محمود ♥ لقاء</h1>
<p class="sub">يسرنا دعوتكم لحضور حفل زفافنا المبارك</p>

<div class="card">
<h2>📅 التاريخ</h2>
<p>20 / 6 / 2026</p>
</div>

<div class="card">
<h2>📍 المكان</h2>
<p>قاعة أفراح - قلين</p>
</div>

<div class="card">
<h2>⏳ العد التنازلي</h2>
<div class="countdown" id="countdown"></div>
</div>

<a class="btn" 
href="https://wa.me/?text=أؤكد%20حضوري%20لفرح%20محمود%20و%20لقاء%20💍" 
target="_blank">
تأكيد الحضور واتساب
</a>

</div>

<script>
const weddingDate = new Date("2026-06-20T20:00:00").getTime();

setInterval(()=>{
let now = new Date().getTime();
let diff = weddingDate - now;

let days = Math.floor(diff/(1000*60*60*24));
let hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
let mins = Math.floor((diff%(1000*60*60))/(1000*60));
let secs = Math.floor((diff%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
days+" يوم - "+hours+" ساعة - "+mins+" دقيقة - "+secs+" ثانية";
},1000);
</script>

</body>
</html>
