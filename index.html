<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف محمود ولقاء</title>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.28/build/spline-viewer.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Amiri', serif; background: #0f0f0f; color: #fff; overflow: hidden; }
        
        /* شاشة الظرف */
        #envelope-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #d4af37; display: flex; justify-content: center; align-items: center;
            z-index: 100; cursor: pointer; transition: 0.8s;
        }

        /* الدعوة */
        #invitation-content { display: none; text-align: center; padding: 20px; }
        
        /* التايمر */
        .timer { display: flex; justify-content: center; gap: 15px; font-size: 1.5rem; margin: 20px 0; }
        .btn { display: inline-block; padding: 15px 30px; background: #d4af37; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="envelope-screen" onclick="openEnvelope()">
        <h1 style="font-size: 3rem;">✉️ اضغط لفتح الدعوة</h1>
    </div>

    <div id="invitation-content">
        <spline-viewer url="https://prod.spline.design/i92r79aP5wX8aYqZ/scene.splinecode"></spline-viewer>
        <h1>محمود & لقاء</h1>
        <p>ننتظركم لمشاركتنا فرحة العمر</p>
        
        <div class="timer" id="timer"></div>
        
        <p>📅 20 يونيو 2026 | 🕗 8:00 مساءً</p>
        <p>📍 قاعة الماسة - قلين</p>
        <a href="https://maps.app.goo.gl/رابط-الموقع-الخاص-بك" class="btn">عرض الموقع (Google Maps)</a>
    </div>

    <audio id="bg-music" loop>
        <source src="your-song.mp3" type="audio/mpeg">
    </audio>

    <script>
        function openEnvelope() {
            document.getElementById('envelope-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('envelope-screen').style.display = 'none';
                document.getElementById('invitation-content').style.display = 'block';
                document.getElementById('bg-music').play();
            }, 800);
        }

        // التايمر
        const weddingDate = new Date("June 20, 2026 20:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = weddingDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("timer").innerHTML = `<div>${days} يوم</div>`;
        }, 1000);
    </script>
</body>
</html>
