<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محمود ♥ لقاء</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:white;
text-align:center;
padding:50px;
}

h1{
color:gold;
font-size:60px;
}

.card{
max-width:700px;
margin:auto;
padding:20px;
border:2px solid gold;
border-radius:15px;
}

#countdown{
font-size:30px;
color:gold;
margin-top:20px;
}
</style>
</head>
<body>

<div class="card">
<h1>محمود ♥ لقاء</h1>

<h2>دعوة لحضور حفل الزفاف</h2>

<p>📅 20 / 6</p>

<p>📍 قلين</p>

<div id="countdown"></div>
</div>

<script>
const weddingDate = new Date("2026-06-20T20:00:00").getTime();

setInterval(()=>{
const now = new Date().getTime();
const distance = weddingDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));

document.getElementById("countdown").innerHTML =
"متبقي " + days + " يوم و " + hours + " ساعة";
},1000);
</script>

</body>
</html>
